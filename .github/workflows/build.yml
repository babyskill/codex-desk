name: Build Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            command: npm run dist:mac
            releaseCommand: npm run release:mac
          - os: windows-latest
            command: npm run dist:win
            releaseCommand: npm run release:win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Package app
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ${{ matrix.command }}

      - name: Publish release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: ${{ matrix.releaseCommand }}
        env:
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-desk-${{ matrix.os }}
          path: release/**
